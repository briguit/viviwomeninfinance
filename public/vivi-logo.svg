<svg viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vivi">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B7CF5"/>
      <stop offset="100%" stop-color="#7B3070"/>
    </linearGradient>
  </defs>

  <!-- Left arm: smooth arc from upper-left down to V bottom -->
  <path
    d="M 55 38 C 32 90 52 150 100 182"
    fill="none" stroke="url(#g)" stroke-width="20" stroke-linecap="round"
  />

  <!-- Right arm: starts upper-right, loops around forming the leaf/pretzel, back to V bottom -->
  <path
    d="M 100 182
       C 138 145 158 100 162 68
       C 166 36 158 14 140 10
       C 122 6 116 24 128 38
       C 138 50 148 46 148 60
       C 148 74 138 88 130 104"
    fill="none" stroke="url(#g)" stroke-width="20" stroke-linecap="round"
  />
</svg>
